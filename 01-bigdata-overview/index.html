<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>01 大数据场景化解决方案总览 - VisLab</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        .placeholder-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 20px;
            min-height: 100vh;
        }

        .placeholder-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .placeholder-header h1 {
            font-size: 2.2rem;
            color: var(--accent-client);
            margin-bottom: 12px;
        }

        .placeholder-header p {
            color: var(--text-secondary);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--accent-client);
            text-decoration: none;
            margin-bottom: 30px;
            padding: 8px 14px;
            border: 1px solid var(--accent-client);
            border-radius: 6px;
            transition: all 0.25s;
        }

        .back-link:hover {
            background: rgba(59, 130, 246, 0.1);
        }

        .topic-list {
            display: grid;
            gap: 16px;
        }

        .topic-item {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 24px;
        }

        .topic-item h3 {
            color: var(--text-primary);
            margin-bottom: 8px;
            font-size: 1.1rem;
        }

        .topic-item p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .pending-badge {
            display: inline-block;
            font-size: 0.75rem;
            padding: 3px 10px;
            border-radius: 20px;

<body>
    <div class="placeholder-container">
        <a href="../index.html" class="back-link">&#8592; 返回模块总览</a>

        <header class="placeholder-header">

            <p>考试占比 15% | 待开发可视化模块</p>
        </header>

        <div class="topic-list">
            <div class="topic-item">
                <h3>&#127919; 大数据基础概念</h3>

                <span class="pending-badge">待开发</span>
            </div>
            <div class="topic-item">

            </div>
            <div class="topic-item">
                <h3>&#127972; 华为 FusionInsight MRS</h3>
                <p>产品定位、核心组件、四大能力、多租户隔离与高可用容灾。</p>
                <span class="pending-badge">待开发</span>
            </div>
            <div class="topic-item">
                <h3>&#128193; 数据湖演进</h3>
                <p>从数据仓库到数据湖、存算一体到存算分离的技术演进趋势。</p>
                <span class="pending-badge">待开发</span>
            </div>
        </div>
