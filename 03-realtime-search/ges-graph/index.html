<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GES 图引擎服务 - VisLab</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <style>
        .placeholder-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 20px;
            min-height: 100vh;
        }

        .placeholder-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .placeholder-header h1 {
            font-size: 2.2rem;
            color: var(--accent-coord);
            margin-bottom: 12px;
        }

        .placeholder-header p {
            color: var(--text-secondary);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--accent-coord);
            text-decoration: none;
            margin-bottom: 30px;
            padding: 8px 14px;
            border: 1px solid var(--accent-coord);
            border-radius: 6px;
            transition: all 0.25s;
        }

        .back-link:hover {
            background: rgba(168, 85, 247, 0.1);
        }

        .topic-list {
            display: grid;
            gap: 16px;
        }

        .topic-item {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 24px;
        }

        .topic-item h3 {
            color: var(--text-primary);
            margin-bottom: 8px;
            font-size: 1.1rem;
        }

        .topic-item p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .pending-badge {
            display: inline-block;
            font-size: 0.75rem;
            padding: 3px 10px;
            border-radius: 20px;
            background: rgba(148, 163, 184, 0.15);
            color: var(--text-muted);
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="placeholder-container">
        <a href="../index.html" class="back-link">&#8592; 返回实时检索模块</a>

        <header class="placeholder-header">
            <h1>GES 图引擎服务</h1>
            <p>第三模块 | 待开发可视化模块</p>
        </header>

        <div class="topic-list">
            <div class="topic-item">
                <h3>&#127760; 属性图模型</h3>
                <p>节点、边、属性的图数据模型，支持百亿节点、千亿关系规模。</p>
                <span class="pending-badge">待开发</span>
            </div>
            <div class="topic-item">
                <h3>&#128187; Gremlin 查询语言</h3>
                <p>图遍历查询语言与常见图分析模式。</p>
                <span class="pending-badge">待开发</span>
            </div>
            <div class="topic-item">
                <h3>&#128268; REST 接口</h3>
                <p>GES 对外提供的 REST API 调用方式。</p>
                <span class="pending-badge">待开发</span>
            </div>
            <div class="topic-item">
                <h3>&#128200; 典型场景：金融反欺诈</h3>
                <p>多层关联分析与关系图谱应用。</p>
                <span class="pending-badge">待开发</span>
            </div>
        </div>
    </div>
</body>
</html>
